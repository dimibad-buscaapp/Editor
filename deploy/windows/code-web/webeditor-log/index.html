<!DOCTYPE html>
<html lang="pt-BR">
<head>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1" />
	<title>Princy — Boot log /webeditor</title>
	<style>
		:root { --bg: #0d0d0d; --panel: #161616; --border: #2a2a2a; --text: #e8e8e8; --muted: #888; --ok: #3dd68c; --warn: #e5c07b; --err: #f14c4c; --accent: #7c6af7; }
		* { box-sizing: border-box; }
		body { margin: 0; font-family: Consolas, 'Segoe UI', monospace; background: var(--bg); color: var(--text); font-size: 12px; }
		header { padding: 12px 16px; border-bottom: 1px solid var(--border); display: flex; flex-wrap: wrap; gap: 10px; align-items: center; }
		h1 { margin: 0; font-size: 16px; font-family: 'Segoe UI', sans-serif; }
		.toolbar { padding: 8px 16px; border-bottom: 1px solid var(--border); display: flex; flex-wrap: wrap; gap: 8px; }
		button, a.btn { background: #2a2a2a; color: var(--text); border: 1px solid #444; padding: 6px 10px; border-radius: 4px; cursor: pointer; font-size: 11px; text-decoration: none; font-family: inherit; }
		button.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
		button:disabled { opacity: 0.5; }
		main { display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: auto 1fr; gap: 10px; padding: 10px; height: calc(100vh - 100px); }
		.panel { background: var(--panel); border: 1px solid var(--border); border-radius: 6px; display: flex; flex-direction: column; min-height: 0; overflow: hidden; }
		.panel.wide { grid-column: 1 / -1; max-height: 38vh; }
		.panel h2 { margin: 0; padding: 8px 10px; font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em; color: var(--muted); border-bottom: 1px solid var(--border); font-family: 'Segoe UI', sans-serif; }
		#timeline { flex: 1; overflow: auto; padding: 4px 0; font-size: 11px; }
		.row { display: grid; grid-template-columns: 64px 24px 1fr; gap: 6px; padding: 4px 10px; border-bottom: 1px solid #222; }
		.row.ok .st { color: var(--ok); }
		.row.warn .st { color: var(--warn); }
		.row.err .st { color: var(--err); }
		.row.run .st { color: var(--accent); }
		.ms { color: var(--muted); }
		#serverLog { flex: 1; margin: 0; padding: 8px 10px; overflow: auto; white-space: pre-wrap; word-break: break-all; background: #0a0a0a; color: #b8b8b8; border: none; resize: none; font: inherit; line-height: 1.45; }
		#preview { flex: 1; min-height: 200px; border: none; width: 100%; background: #000; }
		.status { padding: 6px 10px; font-size: 10px; color: var(--muted); border-top: 1px solid var(--border); font-family: 'Segoe UI', sans-serif; }
		.live-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; background: var(--ok); margin-right: 6px; animation: pulse 1.2s infinite; }
		@keyframes pulse { 50% { opacity: 0.35; } }
		@media (max-width: 900px) { main { grid-template-columns: 1fr; height: auto; } }
	</style>
</head>
<body>
	<header>
		<h1>Web Editor — log em tempo real</h1>
		<span style="color:var(--muted);font-size:11px" id="clock"></span>
	</header>
	<div class="toolbar">
		<button type="button" class="primary" id="btnRun">Iniciar teste completo</button>
		<button type="button" id="btnCopyAll">Copiar tudo</button>
		<button type="button" id="btnCopyServer">Copiar log servidor</button>
		<label style="color:var(--muted);display:flex;align-items:center;gap:6px">
			<input type="checkbox" id="livePoll" checked /> Tempo real (2s)
		</label>
		<a class="btn" href="/webeditor/" target="_blank" rel="noreferrer">Abrir editor</a>
	</div>
	<main>
		<section class="panel wide">
			<h2><span class="live-dot" id="liveDot"></span> Servidor VPS (logs code-web, caddy, agent)</h2>
			<pre id="serverLog">Aguardando...</pre>
			<div class="status" id="serverStatus">API: /princy-api/api/editor/runtime-log</div>
		</section>
		<section class="panel">
			<h2>Timeline do boot (browser)</h2>
			<div id="timeline"></div>
			<div class="status" id="summary">—</div>
		</section>
		<section class="panel">
			<h2>Preview iframe /webeditor/</h2>
			<iframe id="preview" title="webeditor" src="about:blank"></iframe>
		</section>
	</main>
	<script>
	(function () {
		const STORAGE_T0 = 'princy_webeditor_boot_t0';
		const EDITOR_URL = '/webeditor/';
		const RUNTIME_LOG_API = '/princy-api/api/editor/runtime-log?lines=100';
		const timeline = document.getElementById('timeline');
		const summary = document.getElementById('summary');
		const preview = document.getElementById('preview');
		const serverLog = document.getElementById('serverLog');
		const serverStatus = document.getElementById('serverStatus');
		const livePoll = document.getElementById('livePoll');
		const liveDot = document.getElementById('liveDot');

		let t0 = 0;
		let rows = [];
		let pollTimer = null;
		let serverPollTimer = null;
		let lastServerText = '';
		let running = false;

		function now() { return performance.now(); }
		function elapsed() { return t0 ? Math.round(now() - t0) : 0; }
		function wall() { return new Date().toLocaleTimeString('pt-BR'); }

		setInterval(function () {
			document.getElementById('clock').textContent = wall();
		}, 500);

		function escapeHtml(s) {
			return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
		}

		function addRow(status, message, detail) {
			const ms = elapsed();
			rows.push({ ms, status, message, detail: detail || '', wall: wall() });
			const div = document.createElement('div');
			div.className = 'row ' + status;
			div.innerHTML = '<span class="ms">+' + ms + 'ms</span><span class="st">' + status.toUpperCase() + '</span><span class="msg">' + escapeHtml(message) + (detail ? '<br><small style="color:#888">' + escapeHtml(detail) + '</small>' : '') + '</span>';
			timeline.appendChild(div);
			timeline.scrollTop = timeline.scrollHeight;
			const err = rows.filter(function (r) { return r.status === 'err'; }).length;
			summary.textContent = rows.length + ' eventos, ' + err + ' erros, ultimo +' + ms + 'ms';
		}

		function setT0() {
			t0 = now();
			sessionStorage.setItem(STORAGE_T0, String(Date.now()));
			addRow('ok', 'T0 inicio do teste', wall());
		}

		function useHubT0() {
			const hub = sessionStorage.getItem(STORAGE_T0);
			if (hub) {
				const wallMs = parseInt(hub, 10);
				if (!isNaN(wallMs)) {
					t0 = now() - (Date.now() - wallMs);
					addRow('ok', 'T0 da landing (botao Abrir Editor)', new Date(wallMs).toLocaleString('pt-BR'));
					return true;
				}
			}
			return false;
		}

		async function fetchProbe(label, url, opts) {
			try {
				const r = await fetch(url, Object.assign({ cache: 'no-store' }, opts || {}));
				const text = await r.text();
				const hasWb = /WORKBENCH_WEB_CONFIGURATION|workbench\.web\.main/.test(text);
				const isHtml = text.trimStart().startsWith('<');
				if (!r.ok) {
					addRow('err', label + ' HTTP ' + r.status, url);
					return;
				}
				addRow(hasWb || !isHtml ? 'ok' : 'warn', label + ' HTTP ' + r.status, (hasWb ? 'workbench OK · ' : 'HTML · ') + text.slice(0, 80));
			} catch (e) {
				addRow('err', label, (e && e.message) || String(e));
			}
		}

		function formatServerLogs(data) {
			let out = '# Princy runtime log ' + new Date(data.ts).toLocaleString('pt-BR') + '\n';
			out += '# root: ' + data.projectRoot + '\n\n';
			const names = Object.keys(data.logs || {});
			for (let i = 0; i < names.length; i++) {
				const n = names[i];
				out += '=== ' + n + ' ===\n';
				const lines = data.logs[n] || [];
				for (let j = 0; j < lines.length; j++) {
					out += lines[j] + '\n';
				}
				out += '\n';
			}
			return out;
		}

		async function pullServerLogs() {
			try {
				const r = await fetch(RUNTIME_LOG_API, { cache: 'no-store' });
				if (!r.ok) {
					serverStatus.textContent = 'Erro HTTP ' + r.status + ' em ' + RUNTIME_LOG_API;
					liveDot.style.background = 'var(--err)';
					return;
				}
				const data = await r.json();
				const text = formatServerLogs(data);
				if (text !== lastServerText) {
					const atBottom = serverLog.scrollHeight - serverLog.scrollTop <= serverLog.clientHeight + 40;
					serverLog.textContent = text;
					lastServerText = text;
					if (atBottom) serverLog.scrollTop = serverLog.scrollHeight;
				}
				serverStatus.textContent = 'Atualizado ' + wall() + ' · ' + RUNTIME_LOG_API;
				liveDot.style.background = 'var(--ok)';
			} catch (e) {
				serverStatus.textContent = 'Falha: ' + ((e && e.message) || e);
				liveDot.style.background = 'var(--err)';
			}
		}

		function startServerPoll() {
			if (serverPollTimer) clearInterval(serverPollTimer);
			pullServerLogs();
			serverPollTimer = setInterval(function () {
				if (livePoll.checked) pullServerLogs();
			}, 2000);
		}

		function pollIframe() {
			let n = 0;
			if (pollTimer) clearInterval(pollTimer);
			pollTimer = setInterval(function () {
				n++;
				try {
					const doc = preview.contentDocument;
					if (!doc) return;
					const html = doc.documentElement ? doc.documentElement.innerHTML : '';
					if (/WORKBENCH_WEB_CONFIGURATION/.test(html) && !pollIframe._c) {
						pollIframe._c = true;
						addRow('ok', 'Iframe: WORKBENCH no DOM');
					}
					if (doc.querySelector('.monaco-workbench, .part')) {
						addRow('ok', 'Iframe: UI workbench visivel', '+' + elapsed() + 'ms total');
						clearInterval(pollTimer);
						running = false;
						document.getElementById('btnRun').disabled = false;
					}
				} catch (e) {
					if (n === 1) addRow('warn', 'Iframe read', (e && e.message) || '');
				}
				if (n > 180) {
					clearInterval(pollTimer);
					addRow('err', 'Timeout 3min sem UI workbench');
					running = false;
					document.getElementById('btnRun').disabled = false;
				}
			}, 1000);
		}

		preview.addEventListener('load', function () {
			addRow('ok', 'Iframe load', preview.src);
			pollIframe();
		});

		async function runFullTest() {
			if (running) return;
			running = true;
			document.getElementById('btnRun').disabled = true;
			timeline.innerHTML = '';
			rows = [];
			pollIframe._c = false;
			if (!useHubT0()) setT0();
			addRow('run', 'Probes HTTP');
			await fetchProbe('GET /webeditor/', location.origin + EDITOR_URL);
			await fetchProbe('GET /princy-api/health', location.origin + '/princy-api/api/agent/health');
			addRow('run', 'Iframe ' + EDITOR_URL);
			preview.src = EDITOR_URL;
		}

		function copyText(text) {
			navigator.clipboard.writeText(text).then(function () {
				addRow('ok', 'Copiado para clipboard', text.length + ' chars');
			});
		}

		document.getElementById('btnRun').addEventListener('click', runFullTest);
		document.getElementById('btnCopyAll').addEventListener('click', function () {
			const boot = rows.map(function (r) {
				return '[' + r.wall + '] +' + r.ms + 'ms ' + r.status + ' ' + r.message + (r.detail ? ' | ' + r.detail : '');
			}).join('\n');
			copyText('=== BOOT TIMELINE ===\n' + boot + '\n\n=== SERVER ===\n' + lastServerText);
		});
		document.getElementById('btnCopyServer').addEventListener('click', function () { copyText(lastServerText); });
		livePoll.addEventListener('change', startServerPoll);

		startServerPoll();

		if (new URLSearchParams(location.search).get('autostart') === '1') {
			setTimeout(runFullTest, 400);
		} else {
			addRow('ok', 'Pagina carregada', 'Use Iniciar teste ou ?autostart=1');
		}
	})();
	</script>
</body>
</html>
