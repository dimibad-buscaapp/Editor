<!DOCTYPE html>
<html lang="pt-BR">
<head>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1" />
	<title>Princy Starter Log — sistema</title>
	<style>
		* { box-sizing: border-box; margin: 0; padding: 0; }
		html, body { height: 100%; overflow: hidden; }
		body {
			font-family: "Cascadia Mono", "Consolas", "Courier New", monospace;
			background: #0c0c0c;
			color: #cccccc;
			font-size: 13px;
		}
		.shell {
			display: grid;
			grid-template-columns: 320px 1fr;
			grid-template-rows: 36px 1fr 28px;
			height: 100vh;
		}
		.titlebar {
			grid-column: 1 / -1;
			background: #1e1e1e;
			border-bottom: 1px solid #3c3c3c;
			display: flex;
			align-items: center;
			padding: 0 12px;
			gap: 8px;
			font-size: 12px;
		}
		.titlebar .icon { color: #3a96dd; font-weight: bold; }
		.titlebar .path { color: #9cdcfe; flex: 1; }
		.checklist {
			grid-row: 2;
			background: #1e1e1e;
			border-right: 1px solid #3c3c3c;
			overflow-y: auto;
			padding: 8px 0;
		}
		.checklist h2 {
			font-size: 11px;
			font-weight: 600;
			color: #808080;
			text-transform: uppercase;
			padding: 8px 12px 6px;
			letter-spacing: 0.05em;
		}
		.step {
			display: flex;
			align-items: flex-start;
			gap: 8px;
			padding: 6px 12px;
			border-left: 3px solid transparent;
			font-size: 12px;
			line-height: 1.35;
		}
		.step.pending { color: #808080; }
		.step.running { color: #dcdcaa; border-left-color: #dcdcaa; background: #2d2d1e; }
		.step.ok { color: #4ec9b0; border-left-color: #4ec9b0; }
		.step.warn { color: #dcdcaa; border-left-color: #ce9178; }
		.step.error { color: #f48771; border-left-color: #f48771; background: #2d1e1e; }
		.step .box {
			flex-shrink: 0;
			width: 14px;
			font-weight: bold;
			font-size: 11px;
		}
		.step .lbl { flex: 1; }
		.step .sub { display: block; font-size: 10px; color: #808080; margin-top: 2px; }
		.terminal-wrap {
			grid-row: 2;
			display: flex;
			flex-direction: column;
			min-height: 0;
			background: #0c0c0c;
		}
		.terminal-toolbar {
			display: flex;
			flex-wrap: wrap;
			gap: 6px;
			padding: 6px 10px;
			background: #252526;
			border-bottom: 1px solid #3c3c3c;
		}
		.terminal-toolbar button {
			font-family: inherit;
			font-size: 11px;
			background: #3c3c3c;
			color: #cccccc;
			border: 1px solid #555;
			padding: 4px 10px;
			cursor: pointer;
			border-radius: 2px;
		}
		.terminal-toolbar button:hover { background: #505050; }
		.terminal-toolbar button.run { background: #0e639c; border-color: #1177bb; }
		#terminal {
			flex: 1;
			overflow-y: auto;
			padding: 10px 14px;
			white-space: pre-wrap;
			word-break: break-word;
			line-height: 1.45;
		}
		#terminal .ps-prompt { color: #cccccc; }
		#terminal .ps-cmd { color: #dcdcaa; }
		#terminal .ps-out { color: #b5cea8; }
		#terminal .ps-err { color: #f48771; }
		#terminal .ps-info { color: #9cdcfe; }
		#terminal .ps-warn { color: #ce9178; }
		#terminal .ps-ok { color: #4ec9b0; }
		#terminal .ps-muted { color: #808080; }
		.statusbar {
			grid-column: 1 / -1;
			background: #007acc;
			color: #fff;
			font-size: 11px;
			padding: 0 12px;
			display: flex;
			align-items: center;
			gap: 16px;
		}
		.hints {
			padding: 8px 12px;
			background: #3a2d1e;
			border-top: 1px solid #5a4a2a;
			font-size: 11px;
			color: #ce9178;
			max-height: 80px;
			overflow-y: auto;
		}
		@media (max-width: 900px) {
			.shell { grid-template-columns: 1fr; grid-template-rows: 36px auto 1fr 28px; }
			.checklist { max-height: 200px; grid-row: 2; border-right: none; border-bottom: 1px solid #3c3c3c; }
			.terminal-wrap { grid-row: 3; }
		}
	</style>
</head>
<body>
	<div class="shell">
		<div class="titlebar">
			<span class="icon">PS</span>
			<span>Administrador: Princy Starter Log</span>
			<span class="path">C:\Apps\Editor\logs\</span>
		</div>

		<aside class="checklist" id="checklist">
			<h2>Checklist — Index ate Code Web</h2>
			<div id="stepsList"></div>
		</aside>

		<div class="terminal-wrap">
			<div class="terminal-toolbar">
				<button type="button" class="run" id="btnRun">Executar diagnostico (starter)</button>
				<button type="button" id="btnCopy">Copiar terminal</button>
				<button type="button" id="btnTail">Atualizar logs NSSM</button>
				<label style="font-size:11px;color:#aaa;display:flex;align-items:center;gap:4px">
					<input type="checkbox" id="liveTail" checked /> tail logs 3s
				</label>
			</div>
			<pre id="terminal"></pre>
			<div class="hints" id="hints" hidden></div>
		</div>

		<div class="statusbar">
			<span id="statusText">Pronto</span>
			<span id="statusClock">--:--:--</span>
		</div>
	</div>

	<script>
	(function () {
		const API = '/princy-api';
		const terminal = document.getElementById('terminal');
		const stepsList = document.getElementById('stepsList');
		const hintsEl = document.getElementById('hints');
		const statusText = document.getElementById('statusText');
		let tailTimer = null;
		let running = false;
		let buffer = '';


		function wall() {
			return new Date().toLocaleTimeString('pt-BR');
		}
		setInterval(function () {
			document.getElementById('statusClock').textContent = wall();
		}, 500);

		function esc(s) {
			return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
		}

		function appendLine(text, cls) {
			buffer += text + '\n';
			const span = document.createElement('span');
			if (cls) span.className = cls;
			span.textContent = text + '\n';
			terminal.appendChild(span);
			terminal.scrollTop = terminal.scrollHeight;
		}

		function clearTerminal() {
			buffer = '';
			terminal.innerHTML = '';
		}

		function updateStep(step) {
			const el = document.getElementById('step-' + step.id);
			if (!el) {
				const div = document.createElement('div');
				div.className = 'step ' + step.status;
				div.id = 'step-' + step.id;
				const box = step.status === 'running' ? '[~]' : step.status === 'ok' ? '[x]' : step.status === 'warn' ? '[!]' : step.status === 'error' ? '[X]' : '[ ]';
				div.innerHTML = '<span class="box">' + box + '</span><span class="lbl">' + esc(step.label) +
					'<span class="sub">' + esc(step.detail) + '</span></span>';
				stepsList.appendChild(div);
				return;
			}
			el.className = 'step ' + step.status;
			const box = step.status === 'running' ? '[~]' : step.status === 'ok' ? '[x]' : step.status === 'warn' ? '[!]' : step.status === 'error' ? '[X]' : '[ ]';
			el.innerHTML = '<span class="box">' + box + '</span><span class="lbl">' + esc(step.label) +
				'<span class="sub">' + esc(step.detail) + '</span></span>';
		}

		function classifyLine(text) {
			if (/^\s*PS>/.test(text)) return 'ps-cmd';
			if (/\[ERRO\]|error|fatal|exception/i.test(text)) return 'ps-err';
			if (/RUNNING|True|OK|encontrado/i.test(text)) return 'ps-ok';
			if (/AVISO|WARN|NAO /i.test(text)) return 'ps-warn';
			if (/StatusCode|Tempo|Preview|Copyright/i.test(text)) return 'ps-info';
			return 'ps-out';
		}

		async function pullTailLogs() {
			try {
				const r = await fetch(API + '/api/editor/runtime-log?lines=40', { cache: 'no-store' });
				if (!r.ok) return;
				const data = await r.json();
				const err = (data.logs && data.logs['code-web.err.log']) || [];
				const tail = err.slice(-8).join('\n');
				if (tail && !buffer.includes(tail)) {
					appendLine('', 'ps-muted');
					appendLine('--- tail code-web.err.log ---', 'ps-muted');
					tail.split('\n').forEach(function (ln) { appendLine('    ' + ln, classifyLine(ln)); });
				}
			} catch (_) { /* ignore */ }
		}

		function startTail() {
			if (tailTimer) clearInterval(tailTimer);
			tailTimer = setInterval(function () {
				if (document.getElementById('liveTail').checked && !running) pullTailLogs();
			}, 3000);
		}

		async function runDiagnostic() {
			if (running) return;
			running = true;
			statusText.textContent = 'Executando starter-check...';
			hintsEl.hidden = true;
			clearTerminal();
			stepsList.innerHTML = '<div class="step pending"><span class="box">[~]</span><span class="lbl">A executar checklist no VPS...</span></div>';

			appendLine('Windows PowerShell', 'ps-info');
			appendLine('Copyright (C) Princy Ai — apenas logs de sistema', 'ps-muted');
			appendLine('', '');
			appendLine('PS> Write-Host "Diagnostico: Index (3220) -> API (3210) -> Code Web (3200)" -ForegroundColor Cyan', 'ps-cmd');
			appendLine('', '');

			try {
				const es = new EventSource(API + '/api/editor/starter-check/stream');
				await new Promise(function (resolve, reject) {
					es.onmessage = function (ev) {
						let msg;
						try { msg = JSON.parse(ev.data); } catch (e) { return; }
						if (msg.type === 'banner') {
							appendLine(String(msg.data && msg.data.text || ''), 'ps-info');
						}
						if (msg.type === 'line' && msg.data && msg.data.text !== undefined) {
							appendLine(msg.data.text, classifyLine(msg.data.text));
						}
						if (msg.type === 'step' && msg.data) {
							updateStep(msg.data);
						}
						if (msg.type === 'done') {
							es.close();
							if (msg.data && msg.data.hints && msg.data.hints.length) {
								hintsEl.hidden = false;
								hintsEl.innerHTML = '<strong>Dicas:</strong><ul>' +
									msg.data.hints.map(function (h) { return '<li>' + esc(h) + '</li>'; }).join('') + '</ul>';
							}
							statusText.textContent = msg.data && msg.data.ok ? 'Starter OK' : 'Falhas encontradas — veja [X]';
							resolve(msg.data);
						}
						if (msg.type === 'error') {
							es.close();
							appendLine('[ERRO] ' + (msg.data && msg.data.message), 'ps-err');
							reject(new Error(msg.data && msg.data.message));
						}
					};
					es.onerror = function () {
						es.close();
						runDiagnosticFallback().then(resolve).catch(reject);
					};
				});
			} catch (e) {
				appendLine('[ERRO stream] ' + (e && e.message), 'ps-err');
				await runDiagnosticFallback();
			} finally {
				running = false;
			}
		}

		async function runDiagnosticFallback() {
			appendLine('PS> # fallback JSON (sem SSE)', 'ps-muted');
			const r = await fetch(API + '/api/editor/starter-check', { cache: 'no-store' });
			if (!r.ok) throw new Error('starter-check HTTP ' + r.status);
			const data = await r.json();
			(data.steps || []).forEach(function (step) {
				updateStep(step);
				(step.logLines || []).forEach(function (ln) { appendLine(ln, classifyLine(ln)); });
				appendLine('', '');
			});
			if (data.hints && data.hints.length) {
				hintsEl.hidden = false;
				hintsEl.innerHTML = '<strong>Dicas:</strong><ul>' +
					data.hints.map(function (h) { return '<li>' + esc(h) + '</li>'; }).join('') + '</ul>';
			}
			statusText.textContent = data.ok ? 'Starter OK' : 'Falhas encontradas';
			return data;
		}

		document.getElementById('btnRun').addEventListener('click', function () { runDiagnostic(); });
		document.getElementById('btnCopy').addEventListener('click', function () {
			navigator.clipboard.writeText(buffer).then(function () {
				statusText.textContent = 'Terminal copiado';
			});
		});
		document.getElementById('btnTail').addEventListener('click', function () { pullTailLogs(); });
		document.getElementById('liveTail').addEventListener('change', startTail);

		stepsList.innerHTML = '<div class="step pending"><span class="box">[ ]</span><span class="lbl">Clique Executar diagnostico</span></div>';
		appendLine('PS> Princy Starter Log carregado (pagina independente — sem dashboard)', 'ps-ok');
		appendLine('PS> Clique "Executar diagnostico" ou aguarde autostart...', 'ps-muted');
		startTail();

		if (new URLSearchParams(location.search).get('autostart') === '1') {
			setTimeout(runDiagnostic, 600);
		}
	})();
	</script>
</body>
</html>
